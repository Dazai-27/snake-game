<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Snake Game</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #00ff00;
    font-family: "Courier New", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

h1 {
    margin-top: 20px;
}

#score {
    margin: 10px 0;
    font-size: 20px;
}

canvas {
    width: min(90vw, 400px);
    height: min(90vw, 400px);
    border: 4px solid #00ff00;
    background: #111;
}

.controls {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 70px 70px 70px;
    gap: 10px;
    justify-content: center;
}

.btn {
    width: 70px;
    height: 70px;
    border: 2px solid #00ff00;
    background: #111;
    color: #00ff00;
    font-size: 28px;
    border-radius: 10px;
    user-select: none;
}

.btn:active {
    background: #00ff00;
    color: #000;
}

.empty {
    visibility: hidden;
}
</style>
</head>
<body>

<h1>SNAKE</h1>
<div id="score">Score: 0</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
    <div class="empty"></div>
    <button class="btn" id="up">▲</button>
    <div class="empty"></div>

    <button class="btn" id="left">◀</button>
    <button class="btn" id="down">▼</button>
    <button class="btn" id="right">▶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");

const box = 20;
const size = canvas.width / box;

let snake = [{ x: 10 * box, y: 10 * box }];
let direction = "";
let score = 0;

let food = {
    x: Math.floor(Math.random() * size) * box,
    y: Math.floor(Math.random() * size) * box
};

function setDirection(dir) {
    if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
    if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
    if (dir === "UP" && direction !== "DOWN") direction = "UP";
    if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
}

document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") setDirection("LEFT");
    if (e.key === "ArrowRight") setDirection("RIGHT");
    if (e.key === "ArrowUp") setDirection("UP");
    if (e.key === "ArrowDown") setDirection("DOWN");
});

document.getElementById("up").addEventListener("click", () => setDirection("UP"));
document.getElementById("down").addEventListener("click", () => setDirection("DOWN"));
document.getElementById("left").addEventListener("click", () => setDirection("LEFT"));
document.getElementById("right").addEventListener("click", () => setDirection("RIGHT"));

function collision(head, body) {
    return body.some(part => part.x === head.x && part.y === head.y);
}

function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = "#1f1f1f";
    for (let i = 0; i <= canvas.width; i += box) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
    }

    // Food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    // Snake
    snake.forEach(segment => {
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(segment.x, segment.y, box, box);
        ctx.strokeStyle = "#000";
        ctx.strokeRect(segment.x, segment.y, box, box);
    });

    let x = snake[0].x;
    let y = snake[0].y;

    if (direction === "LEFT") x -= box;
    if (direction === "RIGHT") x += box;
    if (direction === "UP") y -= box;
    if (direction === "DOWN") y += box;

    if (direction !== "") {

        if (x === food.x && y === food.y) {
            score++;
            scoreText.textContent = "Score: " + score;

            food = {
                x: Math.floor(Math.random() * size) * box,
                y: Math.floor(Math.random() * size) * box
            };
        } else {
            snake.pop();
        }

        const head = { x, y };

        if (
            x < 0 ||
            y < 0 ||
            x >= canvas.width ||
            y >= canvas.height ||
            collision(head, snake)
        ) {
            clearInterval(game);
            setTimeout(() => {
                if (confirm("Game Over!\nScore: " + score + "\n\nPlay Again?")) {
                    location.reload();
                }
            }, 100);
            return;
        }

        snake.unshift(head);
    }
}

const game = setInterval(draw, 120);
</script>

</body>
</html>
